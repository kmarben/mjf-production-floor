// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(dir) {
  const d = new Date(refDate);
  if (view === 'day') {
    d.setDate(d.getDate() + dir);
  } else {
    // Step by 7 days and snap to Monday
    d.setDate(d.getDate() + dir * 7);
    const monday = getMonday(d);
    refDate = monday;
    updateDateBadge();
    if (Object.keys(printerJobs).length) render();
    return;
  }
  refDate = d; updateDateBadge();
  if (Object.keys(printerJobs).length) render();
}

// Returns the Monday of the week containing the given date
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun, 1=Mon...
  const diff = (day === 0) ? -6 : 1 - day; // adjust to Monday
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function goToday() {
  if (view === 'week') {
    refDate = getMonday(new Date());
  } else {
    refDate = new Date();
  }
  updateDateBadge();
  if (Object.keys(printerJobs).length) render();
}

function setView(v) {
  view = v;
  document.getElementById('vbtn-day').classList.toggle('active', v==='day');
  document.getElementById('vbtn-week').classList.toggle('active', v==='week');
  // Update Today/This Week button label
  document.getElementById('btn-today').textContent = v==='week' ? 'This Week' : 'Today';
  // When switching to week view, snap to Monday of current week
  if (v === 'week') refDate = getMonday(new Date());
  else refDate = new Date();
  updateDateBadge();
  if (Object.keys(printerJobs).length || queueJobs.length) render();
}

function updateDateBadge() {
  const r = getRange();
  const el = document.getElementById('date-badge');
  if (view === 'day') {
    el.textContent = r.start.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  } else {
    const s = r.start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const e = new Date(r.end.getTime()-1).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    el.textContent = `${s} – ${e}`;
  }
}

function drillDay(ts) { refDate = new Date(ts); setView('day'); }

// ── Date Range ────────────────────────────────────────────────────────────────
function getRange() {
  const s = new Date(refDate); s.setHours(0,0,0,0);
  const e = new Date(s);
  view === 'day' ? e.setDate(e.getDate()+1) : e.setDate(e.getDate()+7);
  return { start: s, end: e };
}

// ── API ───────────────────────────────────────────────────────────────────────
async function gql(query) {
  const r = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':tok,'API-Version':'2024-01'},
    body:JSON.stringify({query}),
  });
  const d = await r.json();
  if (d.errors) throw new Error(d.errors[0].message);
  return d.data;
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadData() {
  if (!tok) return;
  showLoading();
  try {
    const { statuses, jobs } = await fetchAllData();
    printerStatuses = statuses;
    printerJobs = {}; queueJobs = []; completedJobs = {};
    for (const g of jobs) {
      if (g.groupId === QUEUE_GROUP) queueJobs = g.jobs;
      else if (g.groupId === PRINT_COMPLETED_GROUP) {
        // Bucket completed jobs into printer lanes based on their Printer column value
        // Filter to last 14 days based on End Date
        const cutoff = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000);
        for (const job of g.jobs) {
          if (!job.endDt || job.endDt < cutoff) continue;
          const printerGroupId = PRINTER_DROPDOWN_TO_GROUP[job.printerId];
          if (!printerGroupId) continue;
          if (!completedJobs[printerGroupId]) completedJobs[printerGroupId] = [];
          completedJobs[printerGroupId].push(job);
        }
      }
      else if (PRINTER_GROUPS[g.groupId]) printerJobs[g.groupId] = g.jobs;
    }
    lastLoadTime = new Date();
    consecutiveFailures = 0;
    setConnStatus('ok');
    document.getElementById('upd').textContent = 'Updated '+lastLoadTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('stale-bar').classList.remove('show');
    collapseCfg(); // Auto-hide token bar after successful load
    render();
  } catch(e) {
    consecutiveFailures++;
    setConnStatus('err');
    if (lastLoadTime) {
      document.getElementById('stale-bar').classList.add('show');
      render(); // Keep showing last good data
    } else {
      showErr(e.message);
    }
  }
}

async function autoRefresh() {
  if (!tok) return;
  // Skip if an optimistic update is in flight — don't overwrite local state
  if (pendingOperation) {
    console.log('autoRefresh skipped — pending operation in progress');
    return;
  }
  try {
    const { statuses, jobs } = await fetchAllData();
    printerStatuses = statuses;
    printerJobs = {}; queueJobs = []; completedJobs = {};
    for (const g of jobs) {
      if (g.groupId === QUEUE_GROUP) queueJobs = g.jobs;
      else if (g.groupId === PRINT_COMPLETED_GROUP) {
        // Bucket completed jobs into printer lanes based on their Printer column value
        // Filter to last 14 days based on End Date
        const cutoff = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000);
        for (const job of g.jobs) {
          if (!job.endDt || job.endDt < cutoff) continue;
          const printerGroupId = PRINTER_DROPDOWN_TO_GROUP[job.printerId];
          if (!printerGroupId) continue;
          if (!completedJobs[printerGroupId]) completedJobs[printerGroupId] = [];
          completedJobs[printerGroupId].push(job);
        }
      }
      else if (PRINTER_GROUPS[g.groupId]) printerJobs[g.groupId] = g.jobs;
    }
    lastLoadTime = new Date();
    consecutiveFailures = 0;
    setConnStatus('ok');
    document.getElementById('upd').textContent = 'Updated '+lastLoadTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('stale-bar').classList.remove('show');
    render();
  } catch(e) {
    consecutiveFailures++;
    setConnStatus(consecutiveFailures >= 3 ? 'err' : 'stale');
    document.getElementById('stale-bar').classList.add('show');
  }
}

function setConnStatus(s) {
  const d = document.getElementById('conn-dot');
  d.className = 'conn-dot conn-'+s;
  d.title = s==='ok'?'Connected':s==='stale'?'Stale — retrying':'Connection error';
}

// ── Single combined fetch — both boards in one API call ───────────────────────
async function fetchAllData() {
  const gids = [...Object.keys(PRINTER_GROUPS), QUEUE_GROUP, PRINT_COMPLETED_GROUP];
  const d = await gql(`query {
    jobBoard: boards(ids:[${BOARD_ID}]) {
      groups(ids:${JSON.stringify(gids)}) {
        id
        items_page(limit:100) {
          items {
            id name
            column_values(ids:["${COL.PRINT_DATE}","${COL.START_TIME}","${COL.DURATION}","${COL.END_DATE}","${COL.END_TIME}","${COL.MATERIAL_TYPE}","${COL.PRIORITY}","${COL.BUILD_HEIGHT}","${COL.PRINTER}"]) {
              id value text
            }
          }
        }
      }
    }
    mgmtBoard: boards(ids:[${MGMT_BOARD_ID}]) {
      items_page {
        items {
          id
          column_values(ids:["dropdown_mm3z8jja"]) { id value }
        }
      }
    }
  }`);

  // Parse statuses
  const statuses = {};
  for (const item of d?.mgmtBoard?.[0]?.items_page?.items||[]) {
    const gid = STATUS_ITEMS[item.id]; if (!gid) continue;
    try { const v=JSON.parse(item.column_values[0]?.value||'{}'); statuses[gid]=v?.ids?.[0]??1; } catch { statuses[gid]=1; }
  }

  // Parse jobs across all groups (printer lanes, queue, and print completed)
  const jobs = (d?.jobBoard?.[0]?.groups||[]).map(g=>({
    groupId: g.id,
    jobs: g.items_page.items.map(parseJob),
  }));

  return { statuses, jobs };
}

function parseJob(item) {
  const get = id => item.column_values?.find(c=>c.id===id);
  const pd = get(COL.PRINT_DATE)?.text||null;
  let sh=null,sm=0,eh=null,em=0;
  try{const p=JSON.parse(get(COL.START_TIME)?.value||'null');if(p){sh=p.hour??0;sm=p.minute??0;}}catch{}
  try{const p=JSON.parse(get(COL.END_TIME)?.value||'null');if(p){eh=p.hour??0;em=p.minute??0;}}catch{}
  const ed = get(COL.END_DATE)?.text||null;
  let dur=null; try{const r=get(COL.DURATION)?.text;if(r&&!isNaN(parseFloat(r)))dur=parseFloat(r);}catch{}
  let matId=null; try{const v=JSON.parse(get(COL.MATERIAL_TYPE)?.value||'null');if(v)matId=v?.ids?.[0]??null;}catch{}
  let priorityId=null; try{const v=JSON.parse(get(COL.PRIORITY)?.value||'null');if(v!=null)priorityId=v?.index??null;}catch{}
  let buildHeightId=null; try{const v=JSON.parse(get(COL.BUILD_HEIGHT)?.value||'null');if(v)buildHeightId=v?.ids?.[0]??null;}catch{}
  let printerId=null; try{const v=JSON.parse(get(COL.PRINTER)?.value||'null');if(v)printerId=v?.ids?.[0]??null;}catch{}
  if(!dur && buildHeightId) dur = calcDurationFromHeight(buildHeightId, matId);
  let sdt=null,edt=null;
  if(pd&&sh!==null){const dt=new Date(`${pd}T${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}:00`);if(!isNaN(dt))sdt=dt;}
  if(ed&&eh!==null){const dt=new Date(`${ed}T${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}:00`);if(!isNaN(dt))edt=dt;}
  return {id:item.id,name:item.name,startDt:sdt,endDt:edt,duration:dur,matId,priorityId,buildHeightId,printerId};
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const range = getRange();
  const now   = new Date();
  const gantt = document.getElementById('gantt');

  // Metrics
  let active=0, total=0, queue=queueJobs.length;
  const now2 = new Date();
  const matCounts = { 1: 0, 2: 0 }; // 1=PA12, 2=TPU

  for (const gid of Object.keys(PRINTER_GROUPS)) {
    const jobs = printerJobs[gid]||[];
    // Only count jobs that haven't finished yet
    const upcoming = jobs.filter(j => !j.endDt || j.endDt > now2);
    total += upcoming.length;
    if (jobs.some(j=>j.startDt&&j.endDt&&j.startDt<=now2&&j.endDt>=now2)) active++;
    // Count material types across scheduled jobs
    upcoming.forEach(j => { if (j.matId && matCounts[j.matId] !== undefined) matCounts[j.matId]++; });
  }
  // Count material types in queue
  queueJobs.forEach(j => { if (j.matId && matCounts[j.matId] !== undefined) matCounts[j.matId]++; });

  // Update legend counts
  const tpuEl  = document.getElementById('leg-tpu-count');
  const pa12El = document.getElementById('leg-pa12-count');
  if (tpuEl)  tpuEl.textContent  = matCounts[2];
  if (pa12El) pa12El.textContent = matCounts[1];

  document.getElementById('metrics').innerHTML = `
    <div class="metric metric-active"><div class="metric-val">${active}/${Object.keys(PRINTER_GROUPS).length}</div><div class="metric-lbl">Active</div></div>
    <div class="metric metric-sched"><div class="metric-val">${total}</div><div class="metric-lbl">Scheduled</div></div>
    <div class="metric metric-queue ${queue>10?'metric-queue-urgent':''}"><div class="metric-val">${queue}</div><div class="metric-lbl">Queue</div></div>
  `;

  const slots = buildSlots(range);
  const nowPct = calcPct(now, range);

  // Timeline header
  let html = `<div class="tl-header">
    <div class="tl-label-spacer"><span>Printer</span></div>
    <div class="tl-slots">`;
  slots.forEach(s => {
    const isToday = s.date && s.date.toDateString()===now.toDateString();
    const curHrCls = s.isCurrent ? 'current-hour' : '';
    html += `<div class="tl-slot ${isToday?'today-col':''} ${curHrCls} ${view==='week'?'clickable':''}" ${view==='week'&&s.date?`onclick="drillDay(${s.date.getTime()})"`:''}><div class="tl-slot-main ${s.isCurrent?'current-hour-text':''}">${s.main}</div><div class="tl-slot-sub">${s.sub}</div></div>`;
  });
  html += `</div></div>`;

  // Printer rows
  for (const [gid, name] of Object.entries(PRINTER_GROUPS)) {
    const status = printerStatuses[gid]||1;
    const sc = status===1?'status-ready':status===2?'status-maint':'status-down';
    const st = status===1?'Production Ready':status===2?'Maintenance Required':'Down for Service';
    const jobs = printerJobs[gid]||[];
    const isDown = status===3;

    // Idle = printer is Production Ready but no job currently running
    const hasActive = jobs.some(j=>j.startDt&&j.endDt&&j.startDt<=now&&j.endDt>=now);
    const hasAny = jobs.length > 0;
    const isIdle = !isDown && status===1 && !hasActive;

    // Status badge — show Idle prominently when printer is ready but not running
    const statusBadge = isIdle
      ? `<div class="pr-status-badge status-ready" onclick="openStatusPopup(event,'${gid}',${status})">Production Ready</div>
         <div class="pr-status-badge status-idle" style="margin-top:2px" onclick="openStatusPopup(event,'${gid}',${status})">&#9679; Idle</div>`
      : `<div class="pr-status-badge ${sc}" onclick="openStatusPopup(event,'${gid}',${status})">${st}</div>`;

    const rowBorderCls = isIdle ? 'row-idle' : status===1 ? 'row-ready' : status===2 ? 'row-maint' : 'row-down';

    html += `<div class="printer-row ${rowBorderCls}">
      <div class="pr-label pr-label-wrap">
        <div class="pr-name">${name.replace('MJF ','')}</div>
        <div class="pr-sub">HP Multi Jet Fusion</div>
        ${statusBadge}
        <div class="pr-builds">${jobs.length} build${jobs.length!==1?'s':''}</div>
      </div>
      <div class="pr-timeline ${isDown?'down-bg':''}" id="tl-${gid}">
        <div class="grid-lines">${slots.map(()=>`<div class="grid-line"></div>`).join('')}</div>`;

    // Now line
    if (nowPct >= 0 && nowPct <= 100) {
      html += `<div class="now-line" id="nl-${gid}" style="left:${nowPct.toFixed(3)}%"><div class="now-dot"></div></div>`;
    }

    // Job blocks
    jobs.forEach(job => {
      if (!job.startDt && !job.pending) return;

      // ── Pending placeholder — show at right edge while Lambda schedules ──
      if (job.pending) {
        const matCls = MAT_CLASS[job.matId] || 'mat-other';
        html += `<div class="job-block pending ${matCls}"
          style="right:0;left:auto;width:12%"
          onmouseenter="showTip(event,'${esc(job.name)}','Scheduling...','—','${job.duration?job.duration+'h':'—'}','${MAT_NAME[job.matId]||'—'}')"
          onmouseleave="hideTip()">
          <div class="job-inner">
            <div class="job-name">⟳ ${esc(job.name)}</div>
            <div class="job-times">Scheduling...</div>
          </div>
        </div>`;
        return;
      }

      const jEnd = job.endDt || new Date(job.startDt.getTime()+(job.duration||12)*3600000);
      if (jEnd < range.start || job.startDt > range.end) return;

      const lPct  = calcPct(job.startDt, range);
      const rPct  = calcPct(jEnd, range);

      // Clamp to view boundaries — jobs can start before or end after the view
      const clampL = Math.max(0, lPct);
      const clampR = Math.min(100, rPct);
      const clampW = Math.max(clampR - clampL, 0.3);

      const isNow      = job.startDt <= now && jEnd >= now;
      const isPast     = jEnd < now;
      const contLeft   = lPct < 0;
      const contRight  = rPct > 100;
      const matCls     = MAT_CLASS[job.matId] || 'mat-other';
      const criticalCls = job.priorityId === 2 ? 'critical' : '';

      html += `<div class="job-block ${isPast?'past':''} ${isNow?'active':''} ${contRight?'continues-right':''} ${contLeft?'continues-left':''} ${matCls} ${criticalCls}"
        style="left:${clampL.toFixed(3)}%;width:${clampW.toFixed(3)}%"
        onclick='showDetail(${JSON.stringify({id:job.id,name:job.name,start:job.startDt?.toISOString(),end:jEnd?.toISOString(),duration:job.duration,matId:job.matId,priorityId:job.priorityId,buildHeightId:job.buildHeightId,printer:name})})'
        onmouseenter="showTip(event,'${esc(job.name)}','${fmtTime(job.startDt)}','${fmtTime(jEnd)}','${job.duration?job.duration+'h':'—'}','${MAT_NAME[job.matId]||'—'}')"
        onmouseleave="hideTip()">
        <div class="job-inner">
          <div class="job-name">${esc(job.name)}</div>
          <div class="job-times">${fmtTime(job.startDt)}${jEnd?' → '+fmtTime(jEnd):''}</div>
        </div>
      </div>`;
    });

    // Completed job history blocks (from Print Completed group in Monday)
    // Shown as faded hatched blocks to distinguish from active/scheduled jobs
    const completed = (completedJobs[gid]||[]);
    completed.forEach(job => {
      const sdt = job.startDt ? new Date(job.startDt) : null;
      const edt = job.endDt   ? new Date(job.endDt)   : null;
      if (!sdt || !edt) return;
      if (edt < range.start || sdt > range.end) return;

      const lPct   = calcPct(sdt, range);
      const rPct   = calcPct(edt, range);
      const clampL = Math.max(0, lPct);
      const clampR = Math.min(100, rPct);
      const clampW = Math.max(clampR - clampL, 0.3);
      const contLeft  = lPct < 0;
      const contRight = rPct > 100;
      const matCls = MAT_CLASS[job.matId] || 'mat-other';

      html += `<div class="job-block completed-block ${contRight?'continues-right':''} ${contLeft?'continues-left':''} ${matCls}"
        style="left:${clampL.toFixed(3)}%;width:${clampW.toFixed(3)}%"
        onclick='showCompletedDetail(${JSON.stringify({id:job.id,name:job.name,start:job.startDt,end:job.endDt,duration:job.duration,matId:job.matId,buildHeightId:job.buildHeightId,priorityId:job.priorityId,printer:name,completedAt:job.completedAt})})'
        onmouseenter="showTip(event,'${esc(job.name)} ✓','${fmtTime(sdt)}','${fmtTime(edt)}','${job.duration?job.duration+'h':'—'}','${MAT_NAME[job.matId]||'—'}')"
        onmouseleave="hideTip()">
        <div class="job-inner">
          <div class="job-name">✓ ${esc(job.name)}</div>
          <div class="job-times">${fmtTime(sdt)} → ${fmtTime(edt)}</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  gantt.innerHTML = html;
  renderQueue();
  startNowUpdater(range);
}

function buildSlots(range) {
  const slots = [], now = new Date();
  if (view === 'day') {
    for (let h=0;h<24;h++) {
      const per=h<12?'AM':'PM', h12=h===0?12:h>12?h-12:h;
      const isCurrent = h === now.getHours() && range.start.toDateString() === now.toDateString();
      slots.push({main:`${h12}:00`,sub:per,date:null,isCurrent});
    }
  } else {
    const cur = new Date(range.start);
    while (cur < range.end) {
      const isToday = cur.toDateString() === now.toDateString();
      slots.push({
        main: cur.toLocaleDateString('en-US',{weekday:'short'}),
        sub:  cur.toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        date: new Date(cur),
        isCurrent: isToday, // highlight today in week view
      });
      cur.setDate(cur.getDate()+1);
    }
  }
  return slots;
}

function calcPct(dt, range) {
  return ((dt - range.start) / (range.end - range.start)) * 100;
}

function renderQueue() {
  const qs=document.getElementById('queue-section');
  const qi=document.getElementById('q-items');
  const qc=document.getElementById('q-count');
  qs.style.display='block'; // always show for Add Job button
  qc.textContent = queueJobs.length;

  if (!queueJobs.length) {
    qi.innerHTML = '<div class="queue-empty">No jobs in queue</div>';
    return;
  }
  const sorted = [...queueJobs].sort((a, b) => {
    const aOrder = PRIORITY_CONFIG[Number(a.priorityId)]?.order ?? 99;
    const bOrder = PRIORITY_CONFIG[Number(b.priorityId)]?.order ?? 99;
    return aOrder - bOrder;
  });

  // Group jobs by priority — use string keys consistently
  const groups = {};
  sorted.forEach(j => {
    const key = j.priorityId != null ? String(j.priorityId) : 'none';
    if (!groups[key]) groups[key] = [];
    groups[key].push(j);
  });

  // Render groups in explicit priority order: Critical(2) → High(0) → Medium(7) → Low(6) → none
  const groupOrder = ['2', '0', '7', '6', 'none'];
  let html = '<div class="queue-groups">';
  for (const key of groupOrder) {
    if (!groups[key]?.length) continue;
    const priority = key !== 'none' ? PRIORITY_CONFIG[Number(key)] : null;
    const labelStyle = priority
      ? `background:${priority.color}20;color:${priority.color};border:1px solid ${priority.color}40`
      : `background:var(--surface2);color:var(--text-dim);border:1px solid var(--border2)`;
    const labelText = priority ? priority.label : 'No Priority';

    html += `<div class="queue-priority-group">
      <span class="queue-group-label" style="${labelStyle}">${labelText}</span>
      <div class="queue-items">`;

    groups[key].forEach(j => {
      const chipCls = MAT_CHIP[j.matId] || '';
      html += `<div class="queue-chip ${chipCls}" onclick='showDetail(${JSON.stringify({id:j.id,name:j.name,start:null,end:null,duration:j.duration,matId:j.matId,priorityId:j.priorityId,printer:"Queue"})})'>${esc(j.name)}</div>`;
    });

    html += `</div></div>`;
  }
  html += '</div>';
  qi.innerHTML = html;
}

// ── Now line updater ──────────────────────────────────────────────────────────
function startNowUpdater(range) {
  if (nowLineTimer) clearInterval(nowLineTimer);
  nowLineTimer = setInterval(() => {
    const now=new Date(), pct=calcPct(now,range);
    for (const gid of Object.keys(PRINTER_GROUPS)) {
      const el=document.getElementById(`nl-${gid}`);
      if (el) { el.style.left=pct>=0&&pct<=100?`${pct.toFixed(3)}%`:'-999px'; }
    }
  }, 30000);
}

// ── Detail Panel ──────────────────────────────────────────────────────────────
// ── Detail Panel ──────────────────────────────────────────────────────────────
let currentDetailData = null;

function showDetail(data) {
  if (typeof data === 'string') data = JSON.parse(data);
  currentDetailData = data;
  const panel   = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');
  document.getElementById('dp-title').textContent = data.name;
  const matEl = document.getElementById('dp-mat');
  if (data.matId && MAT_NAME[data.matId]) {
    matEl.textContent   = MAT_NAME[data.matId];
    matEl.style.cssText = MAT_DP_STYLE[data.matId]||'';
    matEl.style.display = 'inline-block';
  } else { matEl.style.display = 'none'; }
  renderDetailBody(data);
  panel.classList.add('open');
  overlay.classList.add('open');
}

function renderDetailBody(data) {
  const now = new Date();
  const sdt = data.start ? new Date(data.start) : null;
  const edt = data.end   ? new Date(data.end)   : null;
  let prog = 0;
  if (sdt && edt && now >= sdt) prog = Math.min(100, ((now-sdt)/(edt-sdt))*100);

  const isQueued      = data.printer === 'Queue';
  const isComplete    = edt && now > edt;
  const hasStarted    = sdt && sdt <= now;
  const isPrinterLane = !isQueued && !!Object.values(PRINTER_GROUPS).find(n => n === data.printer);

  // Start Now: show for scheduled jobs that are not complete
  const showStartBtn = !isQueued && sdt && !isComplete;
  // End Now: show for jobs that have already started (past their start time)
  const showEndBtn   = !isQueued && sdt && hasStarted && !isComplete;

  const nowStr = fmtDateTime(now);

  // Build printer options for assign (queue jobs) and move (printer lane jobs)
  // Only show Production Ready printers, exclude the current printer for move
  const availablePrinters = Object.entries(PRINTER_GROUPS)
    .filter(([gid]) => (printerStatuses[gid] || 1) === 1);

  const printerOptions = availablePrinters
    .map(([gid, pname]) => `<option value="${gid}">${pname}</option>`)
    .join('');

  // For move — exclude the printer the job is currently on
  const currentGid = Object.entries(PRINTER_GROUPS).find(([,name]) => name === data.printer)?.[0];
  const movePrinterOptions = availablePrinters
    .filter(([gid]) => gid !== currentGid)
    .map(([gid, pname]) => {
      // Check if a job is currently active on this printer
      const hasActive = (printerJobs[gid]||[]).some(j => j.startDt && j.endDt && j.startDt <= now && j.endDt >= now);
      return `<option value="${gid}" data-active="${hasActive}">${pname}${hasActive ? ' — job running' : ''}</option>`;
    })
    .join('');

  const noAvailablePrinters  = printerOptions.length === 0;
  const noMovePrinters       = movePrinterOptions.length === 0;

  // Format duration as Xh Ym for readability
  const durFormatted = data.duration
    ? (() => {
        const h = Math.floor(data.duration);
        const m = Math.round((data.duration - h) * 60);
        return m > 0 ? `${h}h ${m}m` : `${h}h`;
      })()
    : '—';

  document.getElementById('dp-body').innerHTML = `
    <div>
      <div class="dp-sec">Schedule</div>
      <div class="dp-row"><span class="dp-lbl">Printer</span><span class="dp-val">${data.printer||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Material</span><span class="dp-val">${MAT_NAME[data.matId]||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Build Height</span><span class="dp-val">${BUILD_HEIGHT_LABELS[data.buildHeightId]||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Priority</span><span class="dp-val" ${data.priorityId!=null&&PRIORITY_CONFIG[Number(data.priorityId)]?`style="color:${PRIORITY_CONFIG[Number(data.priorityId)].color}"`:''}>${data.priorityId!=null&&PRIORITY_CONFIG[Number(data.priorityId)]?PRIORITY_CONFIG[Number(data.priorityId)].label:'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Start</span><span class="dp-val dp-val-accent">${sdt?fmtDateTime(sdt):'Not scheduled'}</span></div>
      <div class="dp-row"><span class="dp-lbl">End</span><span class="dp-val dp-val-accent">${edt?fmtDateTime(edt):'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Duration</span><span class="dp-val">${durFormatted}</span></div>
      <div class="dp-row"><span class="dp-lbl">Remaining</span><span class="dp-val ${edt&&now<edt?'dp-val-green':''}">${edt&&now<edt?fmtRemaining(edt,now):edt?'Complete':'—'}</span></div>
    </div>
    ${sdt&&edt?`<div>
      <div class="dp-sec">Progress</div>
      <div class="dp-progress"><div class="dp-fill" style="width:${prog.toFixed(1)}%"></div></div>
      <div class="dp-progress-label"><span>${prog.toFixed(0)}% complete</span><span>${edt&&now<edt?fmtRemaining(edt,now)+' left':'Complete'}</span></div>
    </div>`:''}
    ${isPrinterLane ? `<div>
      <div class="dp-sec">Move Job</div>
      <select class="dp-assign-select" id="dp-move-select" onchange="updateMoveButtons()">
        <option value="">— Select destination —</option>
        <option value="__queue__">↩ Queue</option>
        ${movePrinterOptions}
      </select>
      <div id="dp-move-btns" style="margin-top:10px;display:none"></div>
      <div id="dp-confirm-area"></div>
      <div id="dp-action-status"></div>
    </div>`:''}
    ${isQueued?`<div>
      <div class="dp-sec">Assign to Printer</div>
      ${noAvailablePrinters
        ? `<div style="font-family:var(--mono);font-size:.78rem;color:var(--red);padding:10px;background:rgba(255,61,87,.08);border:1px solid rgba(255,61,87,.2);border-radius:5px;">No printers currently available</div>`
        : `<select class="dp-assign-select" id="dp-printer-select">
            <option value="">— Select a printer —</option>
            ${printerOptions}
          </select>
          <div class="dp-actions" style="margin-top:10px">
            <button class="dp-btn dp-btn-move-last" onclick="confirmAssign('schedule')">&#9654; Schedule</button>
            <button class="dp-btn dp-btn-move-next" onclick="confirmAssign('next')">&#9654;&#9654; Start Next</button>
          </div>`
      }
      <div id="dp-confirm-area"></div>
      <div id="dp-action-status"></div>
    </div>`:''}
    ${showStartBtn||showEndBtn?`<div>
      <div class="dp-sec">Actions</div>
      <div class="dp-actions">
        ${showStartBtn?`<button class="dp-btn dp-btn-start" id="btn-start" onclick="confirmAction('start')">&#9654; Start Now &nbsp;<span style="font-weight:400;font-size:.75rem;opacity:.8">${nowStr}</span></button>`:''}
        ${showEndBtn?`<button class="dp-btn dp-btn-end" id="btn-end" onclick="confirmAction('end')">&#9632; End Now &nbsp;<span style="font-weight:400;font-size:.75rem;opacity:.8">${nowStr}</span></button>`:''}
      </div>
      <div id="dp-confirm-area"></div>
      <div id="dp-action-status"></div>
    </div>`:''}
  `;
}

function confirmAssign(type = 'schedule') {
  const select = document.getElementById('dp-printer-select');
  if (!select || !select.value) return;

  const gid         = select.value;
  const printerName = PRINTER_GROUPS[gid] || gid;
  const area        = document.getElementById('dp-confirm-area');
  if (!area) return;

  const isNext = type === 'next';

  // Check if target printer has an active job — warn for Start Next
  const now = new Date();
  const hasActive = (printerJobs[gid]||[]).some(j =>
    j.startDt && j.endDt && j.startDt <= now && j.endDt >= now
  );

  const msg = isNext
    ? `Move <strong>${esc(currentDetailData?.name||'')}</strong> to <strong>${printerName}</strong> as the <strong>next job</strong>?${hasActive ? '<br><span style="color:var(--yellow);font-size:.75rem">⚠ A job is currently running — this will start when it finishes</span>' : ''}`
    : `Move <strong>${esc(currentDetailData?.name||'')}</strong> to <strong>${printerName}</strong> and <strong>schedule at end of queue</strong>?`;

  area.innerHTML = `
    <div class="dp-confirm" style="margin-top:10px;border-color:${isNext?'rgba(167,139,250,.3)':'var(--border2)'}">
      <div class="dp-confirm-msg">${msg}</div>
      <div class="dp-confirm-btns">
        <button class="${isNext?'dp-confirm-yes-move-next':'dp-confirm-yes-move-last'}" onclick="executeAssign('${gid}','${type}')">
          ${isNext?'&#9654;&#9654; Confirm Start Next':'&#9654; Confirm Schedule'}
        </button>
        <button class="dp-confirm-no" onclick="cancelConfirm()">Cancel</button>
      </div>
    </div>`;
}

async function executeAssign(gid, type = 'schedule') {
  const data = currentDetailData;
  if (!data) return;

  const area   = document.getElementById('dp-confirm-area');
  const status = document.getElementById('dp-action-status');
  if (area)   area.innerHTML = '';
  if (status) { status.className='dp-status loading'; status.textContent='Assigning to printer...'; }

  document.querySelectorAll('.dp-btn').forEach(b => b.disabled = true);

  // Optimistic update
  queueJobs = queueJobs.filter(j => j.id !== data.id);
  const placeholder = {
    id: data.id, name: data.name,
    startDt: null, endDt: null,
    duration: data.duration, matId: data.matId,
    priorityId: data.priorityId, buildHeightId: data.buildHeightId,
    pending: true,
  };
  if (!printerJobs[gid]) printerJobs[gid] = [];
  printerJobs[gid] = [...printerJobs[gid], placeholder];

  closeDetail();
  render();
  pendingOperation = true;

  try {
    if (type === 'next') {
      // Set start time BEFORE moving so Lambda respects it and cascades
      const now = new Date();
      const activeJob = (printerJobs[gid]||[]).find(j =>
        j.startDt && j.endDt && j.startDt <= now && j.endDt >= now && !j.pending
      );
      const startTime = activeJob ? activeJob.endDt : now;
      const dateStr = startTime.getFullYear()+'-'+String(startTime.getMonth()+1).padStart(2,'0')+'-'+String(startTime.getDate()).padStart(2,'0');
      const hourVal = JSON.stringify({ hour: startTime.getHours(), minute: startTime.getMinutes() });
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({ date: dateStr }));
      await mondayMutate(data.id, COL.START_TIME, hourVal);
      await mondayMoveGroup(data.id, gid);
    } else {
      // Schedule: clear dates then move so Lambda queues at end
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({}));
      await mondayMutate(data.id, COL.START_TIME, JSON.stringify({}));
      await mondayMoveGroup(data.id, gid);
    }

    setTimeout(() => { pendingOperation = false; autoRefresh(); }, 4000);
    setTimeout(() => autoRefresh(), 8000);

  } catch(e) {
    printerJobs[gid] = (printerJobs[gid]||[]).filter(j => j.id !== data.id);
    queueJobs = [...queueJobs, {
      id: data.id, name: data.name,
      startDt: null, endDt: null,
      duration: data.duration, matId: data.matId,
      priorityId: data.priorityId, buildHeightId: data.buildHeightId,
    }];
    pendingOperation = false;
    render();
    console.error('Assignment failed:', e.message);
  }
}


function updateMoveButtons() {
  const select = document.getElementById('dp-move-select');
  const btns   = document.getElementById('dp-move-btns');
  if (!select || !btns) return;

  const val = select.value;
  if (!val) { btns.style.display = 'none'; btns.innerHTML = ''; return; }

  btns.style.display = 'block';

  if (val === '__queue__') {
    btns.innerHTML = `
      <div class="dp-actions">
        <button class="dp-btn dp-btn-queue" onclick="confirmMove('queue')" style="width:100%">&#9664; Move to Queue</button>
      </div>`;
  } else {
    btns.innerHTML = `
      <div class="dp-actions">
        <button class="dp-btn dp-btn-move-last" onclick="confirmMove('last')">&#9654; Schedule</button>
        <button class="dp-btn dp-btn-move-next" onclick="confirmMove('next')">&#9654;&#9654; Start Next</button>
      </div>`;
  }
}

function confirmMove(type) {
  const area = document.getElementById('dp-confirm-area');
  if (!area) return;

  const select = document.getElementById('dp-move-select');
  const val    = select ? select.value : '';

  if (type === 'queue') {
    area.innerHTML = `
      <div class="dp-confirm" style="margin-top:10px;border-color:rgba(255,179,0,.3)">
        <div class="dp-confirm-msg">Move <strong>${esc(currentDetailData?.name||'')}</strong> back to <strong>Queue</strong>?<br>Scheduled dates and times will be cleared.</div>
        <div class="dp-confirm-btns">
          <button class="dp-btn-queue" style="flex:1;padding:11px;border:1px solid rgba(255,179,0,.4);border-radius:6px;font-family:var(--font);font-size:.82rem;font-weight:800;cursor:pointer;background:rgba(255,179,0,.08);color:var(--yellow)" onclick="executeMove(null,'queue')">&#9664; Confirm Move to Queue</button>
          <button class="dp-confirm-no" onclick="cancelConfirm()">Cancel</button>
        </div>
      </div>`;
    return;
  }

  const gid         = val;
  const printerName = PRINTER_GROUPS[gid] || gid;
  const isNext      = type === 'next';

  const hasActive = (printerJobs[gid]||[]).some(j =>
    j.startDt && j.endDt && j.startDt <= new Date() && j.endDt >= new Date()
  );

  const msg = isNext
    ? `Move <strong>${esc(currentDetailData?.name||'')}</strong> to <strong>${printerName}</strong> as the <strong>next job</strong>?${hasActive?'<br><span style="color:var(--yellow);font-size:.75rem">⚠ A job is currently running — this will start when it finishes</span>':''}`
    : `Move <strong>${esc(currentDetailData?.name||'')}</strong> to <strong>${printerName}</strong> and <strong>schedule at end</strong>?`;

  area.innerHTML = `
    <div class="dp-confirm" style="margin-top:10px;border-color:${isNext?'rgba(167,139,250,.3)':'var(--border2)'}">
      <div class="dp-confirm-msg">${msg}</div>
      <div class="dp-confirm-btns">
        <button class="${isNext?'dp-confirm-yes-move-next':'dp-confirm-yes-move-last'}" onclick="executeMove('${gid}','${type}')">
          ${isNext?'&#9654;&#9654; Confirm Start Next':'&#9654; Confirm Schedule'}
        </button>
        <button class="dp-confirm-no" onclick="cancelConfirm()">Cancel</button>
      </div>
    </div>`;
}

async function executeMove(gid, type) {
  const data = currentDetailData;
  if (!data) return;

  const area   = document.getElementById('dp-confirm-area');
  const status = document.getElementById('dp-action-status');
  if (area)   area.innerHTML = '';
  if (status) { status.className='dp-status loading'; status.textContent='Moving job...'; }
  document.querySelectorAll('.dp-btn').forEach(b => b.disabled = true);

  const sourceGid = Object.entries(PRINTER_GROUPS).find(([,name]) => name === data.printer)?.[0];

  // ── Optimistic update ──────────────────────────────────────────────────────
  if (sourceGid) {
    printerJobs[sourceGid] = (printerJobs[sourceGid]||[]).filter(j => j.id !== data.id);
  }

  if (type === 'queue') {
    // Add back to queue immediately
    queueJobs = [...queueJobs, {
      id: data.id, name: data.name,
      startDt: null, endDt: null,
      duration: data.duration, matId: data.matId,
      priorityId: data.priorityId, buildHeightId: data.buildHeightId,
    }];
  } else {
    // Add placeholder to target printer lane
    if (!printerJobs[gid]) printerJobs[gid] = [];
    printerJobs[gid] = [...printerJobs[gid], {
      id: data.id, name: data.name,
      startDt: null, endDt: null,
      duration: data.duration, matId: data.matId,
      priorityId: data.priorityId, buildHeightId: data.buildHeightId,
      pending: true,
    }];
  }

  closeDetail();
  render();
  pendingOperation = true;

  try {
    if (type === 'queue') {
      // Clear all dates, reset Printer column to Queue, move to Queue group
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({}));
      await mondayMutate(data.id, COL.START_TIME,  JSON.stringify({}));
      await mondayMutate(data.id, COL.END_DATE,    JSON.stringify({}));
      await mondayMutate(data.id, COL.END_TIME,    JSON.stringify({}));
      await mondayMutate(data.id, COL.PRINTER,     JSON.stringify({ ids: [QUEUE_DROPDOWN_ID] }));
      await mondayMoveGroup(data.id, QUEUE_GROUP);
      setTimeout(() => { pendingOperation = false; autoRefresh(); }, 2000);

    } else if (type === 'next') {
      const now = new Date();
      const targetJobs = printerJobs[gid] || [];
      const activeJob = targetJobs.find(j =>
        j.startDt && j.endDt && j.startDt <= now && j.endDt >= now && !j.pending
      );
      const startTime = activeJob ? activeJob.endDt : now;
      const dateStr = `${startTime.getFullYear()}-${String(startTime.getMonth()+1).padStart(2,'0')}-${String(startTime.getDate()).padStart(2,'0')}`;
      const hourVal = JSON.stringify({ hour: startTime.getHours(), minute: startTime.getMinutes() });
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({ date: dateStr }));
      await mondayMutate(data.id, COL.START_TIME, hourVal);
      await mondayMoveGroup(data.id, gid);
      setTimeout(() => { pendingOperation = false; autoRefresh(); }, 4000);
      setTimeout(() => autoRefresh(), 8000);

    } else {
      // Schedule: clear dates first so Lambda queues at end
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({}));
      await mondayMutate(data.id, COL.START_TIME, JSON.stringify({}));
      await mondayMoveGroup(data.id, gid);
      setTimeout(() => { pendingOperation = false; autoRefresh(); }, 4000);
      setTimeout(() => autoRefresh(), 8000);
    }

  } catch(e) {
    // Rollback
    if (sourceGid && type !== 'queue') {
      printerJobs[sourceGid] = [...(printerJobs[sourceGid]||[]), {
        id: data.id, name: data.name,
        startDt: data.start ? new Date(data.start) : null,
        endDt:   data.end   ? new Date(data.end)   : null,
        duration: data.duration, matId: data.matId,
        priorityId: data.priorityId, buildHeightId: data.buildHeightId,
      }];
    }
    if (type === 'queue') {
      queueJobs = queueJobs.filter(j => j.id !== data.id);
      if (sourceGid) {
        printerJobs[sourceGid] = [...(printerJobs[sourceGid]||[]), {
          id: data.id, name: data.name,
          startDt: data.start ? new Date(data.start) : null,
          endDt:   data.end   ? new Date(data.end)   : null,
          duration: data.duration, matId: data.matId,
          priorityId: data.priorityId, buildHeightId: data.buildHeightId,
        }];
      }
    } else {
      printerJobs[gid] = (printerJobs[gid]||[]).filter(j => j.id !== data.id);
    }
    pendingOperation = false;
    render();
    console.error('Move failed:', e.message);
  }
}

function confirmAction(type) {
  const now    = new Date();
  const nowStr = fmtDateTime(now);
  const area   = document.getElementById('dp-confirm-area');
  if (!area) return;

  const isStart = type === 'start';
  const confirmClass = isStart ? 'dp-confirm-yes-start' : 'dp-confirm-yes-end';
  const confirmLabel = isStart ? '&#9654; Confirm Start' : '&#9632; Confirm End';
  const borderColor  = isStart ? 'rgba(0,230,118,.25)' : 'rgba(255,179,0,.25)';

  const msg = isStart
    ? `Set <strong>Print Date to today</strong> and <strong>Start Time to ${nowStr}</strong>?<br>Downstream jobs will cascade automatically.`
    : `Set <strong>End Time to ${nowStr}</strong> and move this job to <strong>Print Completed</strong>?`;

  area.innerHTML = `
    <div class="dp-confirm" style="margin-top:10px;border-color:${borderColor}">
      <div class="dp-confirm-msg">${msg}</div>
      <div class="dp-confirm-btns">
        <button class="${confirmClass}" onclick="executeAction('${type}')">${confirmLabel}</button>
        <button class="dp-confirm-no" onclick="cancelConfirm()">Cancel</button>
      </div>
    </div>`;
}

function cancelConfirm() {
  const area = document.getElementById('dp-confirm-area');
  if (area) area.innerHTML = '';
}

// ── Completed Job History ──
// History now comes from Monday's Print Completed group via fetchAllData.
// No local storage — all devices share the same source of truth.

async function executeAction(type) {
  const data = currentDetailData;
  if (!data) return;

  const area   = document.getElementById('dp-confirm-area');
  const status = document.getElementById('dp-action-status');
  if (area)   area.innerHTML = '';
  if (status) { status.className='dp-status loading'; status.textContent='Updating Monday.com...'; }

  document.querySelectorAll('.dp-btn').forEach(b => b.disabled = true);

  try {
    const now      = new Date();
    const dateStr  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const hourVal  = JSON.stringify({ hour: now.getHours(), minute: now.getMinutes() });

    if (type === 'start') {
      await mondayMutate(data.id, COL.PRINT_DATE, JSON.stringify({ date: dateStr }));
      await mondayMutate(data.id, COL.START_TIME, hourVal);
      if (status) { status.className='dp-status ok'; status.textContent='✓ Start time updated — cascading downstream jobs...'; }
      setTimeout(() => { autoRefresh(); currentDetailData={...data,start:now.toISOString()}; renderDetailBody(currentDetailData); }, 3000);

    } else if (type === 'end') {
      await mondayMutate(data.id, COL.END_DATE, JSON.stringify({ date: dateStr }));
      await mondayMutate(data.id, COL.END_TIME, hourVal);
      await mondayMoveGroup(data.id, PRINT_COMPLETED_GROUP);

      // Job moves to Print Completed group in Monday — autoRefresh will pick it
      // up and place it in the correct printer lane history based on its
      // Printer column value

      if (status) { status.className='dp-status ok'; status.textContent='✓ Job marked complete and moved to Print Completed'; }
      setTimeout(() => { closeDetail(); autoRefresh(); }, 2000);
    }

  } catch(e) {
    if (status) { status.className='dp-status err'; status.textContent='✗ Error: '+e.message; }
    document.querySelectorAll('.dp-btn').forEach(b => b.disabled = false);
  }
}

async function mondayMutate(itemId, columnId, value) {
  const q = `mutation { change_column_value(board_id:${BOARD_ID}, item_id:${itemId}, column_id:"${columnId}", value:${JSON.stringify(value)}) { id } }`;
  await gql(q);
}

async function mondayMoveGroup(itemId, groupId) {
  const q = `mutation { move_item_to_group(item_id:${itemId}, group_id:"${groupId}") { id } }`;
  await gql(q);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  currentDetailData = null;
}

// Shows read-only detail for a completed (historical) job
function showCompletedDetail(data) {
  if (typeof data === 'string') data = JSON.parse(data);
  currentDetailData = data;
  const panel   = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');
  document.getElementById('dp-title').innerHTML = `✓ ${data.name}`;

  const matEl = document.getElementById('dp-mat');
  if (data.matId && MAT_NAME[data.matId]) {
    matEl.textContent   = MAT_NAME[data.matId];
    matEl.style.cssText = MAT_DP_STYLE[data.matId]||'';
    matEl.style.display = 'inline-block';
  } else { matEl.style.display = 'none'; }

  const sdt = data.start ? new Date(data.start) : null;
  const edt = data.end   ? new Date(data.end)   : null;
  const completedAt = data.completedAt ? new Date(data.completedAt) : null;

  // Calculate actual duration from real start/end times
  let actualDur = '—';
  if (sdt && edt) {
    const ms = edt - sdt;
    const h  = Math.floor(ms/3600000);
    const m  = Math.floor((ms%3600000)/60000);
    actualDur = h>0 ? `${h}h ${m}m` : `${m}m`;
  }

  document.getElementById('dp-body').innerHTML = `
    <div style="background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);border-radius:5px;padding:8px 12px;font-family:var(--mono);font-size:.7rem;color:var(--green);">
      ✓ Print Completed${completedAt?' — '+fmtDateTime(completedAt):''}
    </div>
    <div>
      <div class="dp-sec">Actual Schedule</div>
      <div class="dp-row"><span class="dp-lbl">Printer</span><span class="dp-val">${data.printer||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Material</span><span class="dp-val">${MAT_NAME[data.matId]||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Build Height</span><span class="dp-val">${BUILD_HEIGHT_LABELS[data.buildHeightId]||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Priority</span><span class="dp-val" ${data.priorityId!=null&&PRIORITY_CONFIG[Number(data.priorityId)]?`style="color:${PRIORITY_CONFIG[Number(data.priorityId)].color}"`:''}>${data.priorityId!=null&&PRIORITY_CONFIG[Number(data.priorityId)]?PRIORITY_CONFIG[Number(data.priorityId)].label:'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Start</span><span class="dp-val">${sdt?fmtDateTime(sdt):'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">End</span><span class="dp-val">${edt?fmtDateTime(edt):'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Planned Duration</span><span class="dp-val">${data.duration ? (() => { const h=Math.floor(data.duration); const m=Math.round((data.duration-h)*60); return m>0?`${h}h ${m}m`:`${h}h`; })() : '—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Actual Duration</span><span class="dp-val dp-val-green">${actualDur}</span></div>
    </div>
  `;

  panel.classList.add('open');
  overlay.classList.add('open');
}

// ── Add Job Modal ─────────────────────────────────────────────────────────────
function openAddJob() {
  // Silently refresh data to ensure printer statuses are current
  if (tok) autoRefresh();

  // Populate printer dropdown with Production Ready printers
  const select = document.getElementById('aj-printer');
  select.innerHTML = '<option value="">— Queue only —</option>';
  Object.entries(PRINTER_GROUPS)
    .filter(([gid]) => (printerStatuses[gid]||1) === 1)
    .forEach(([gid, name]) => {
      const opt = document.createElement('option');
      opt.value = gid;
      opt.textContent = name;
      select.appendChild(opt);
    });

  // Reset form
  document.getElementById('aj-name').value = '';
  document.querySelectorAll('.aj-opt').forEach(b => b.classList.remove('selected'));
  document.getElementById('aj-error').style.display = 'none';
  document.getElementById('aj-status').textContent = '';
  document.getElementById('aj-submit').disabled = false;

  document.getElementById('add-job-overlay').classList.add('open');
  document.getElementById('add-job-modal').classList.add('open');
  setTimeout(() => document.getElementById('aj-name').focus(), 100);
}

function closeAddJob() {
  document.getElementById('add-job-overlay').classList.remove('open');
  document.getElementById('add-job-modal').classList.remove('open');
}

function selectOpt(groupId, btn) {
  document.querySelectorAll(`#${groupId} .aj-opt`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function getSelectedVal(groupId) {
  const sel = document.querySelector(`#${groupId} .aj-opt.selected`);
  return sel ? sel.dataset.val : null;
}

function updateAjActions() {
  const printerGid = document.getElementById('aj-printer').value;
  const btns = document.getElementById('aj-action-btns');

  if (!printerGid) {
    // Queue only — single button
    btns.innerHTML = `<button class="dp-btn dp-btn-move-last" id="aj-submit" onclick="submitAddJob('queue')">&#43; Add to Queue</button>`;
  } else {
    // Printer selected — show Schedule and Start Next
    btns.innerHTML = `
      <button class="dp-btn dp-btn-move-last" id="aj-submit" onclick="submitAddJob('schedule')">&#9654; Schedule</button>
      <button class="dp-btn dp-btn-move-next" onclick="submitAddJob('next')">&#9654;&#9654; Start Next</button>`;
  }
}

async function submitAddJob(mode = 'queue') {
  const name       = document.getElementById('aj-name').value.trim();
  const matId      = getSelectedVal('aj-material');
  const heightId   = getSelectedVal('aj-height');
  const priorityId = getSelectedVal('aj-priority');
  const printerGid = document.getElementById('aj-printer').value;

  const errEl  = document.getElementById('aj-error');
  const statEl = document.getElementById('aj-status');

  if (!name)     { errEl.textContent='Job name is required.';       errEl.style.display='block'; return; }
  if (!matId)    { errEl.textContent='Material Type is required.';  errEl.style.display='block'; return; }
  if (!heightId) { errEl.textContent='Build Height is required.';   errEl.style.display='block'; return; }
  errEl.style.display = 'none';

  document.querySelectorAll('#aj-action-btns .dp-btn').forEach(b => b.disabled = true);
  statEl.className = 'dp-status loading';
  statEl.textContent = 'Creating job...';

  try {
    const colVals = {
      [COL.MATERIAL_TYPE]: { ids: [Number(matId)] },
      [COL.BUILD_HEIGHT]:  { ids: [Number(heightId)] },
    };
    if (priorityId !== null) {
      colVals[COL.PRIORITY] = { index: Number(priorityId) };
    }

    // For Start Next — pre-set start time so Lambda respects it
    const now = new Date();
    if (mode === 'next' && printerGid) {
      const activeJob = (printerJobs[printerGid]||[]).find(j =>
        j.startDt && j.endDt && j.startDt <= now && j.endDt >= now
      );
      const startTime = activeJob ? activeJob.endDt : now;
      colVals[COL.PRINT_DATE] = { date: startTime.getFullYear()+'-'+String(startTime.getMonth()+1).padStart(2,'0')+'-'+String(startTime.getDate()).padStart(2,'0') };
      colVals[COL.START_TIME] = { hour: startTime.getHours(), minute: startTime.getMinutes() };
    }

    const targetGroup = (mode !== 'queue' && printerGid) ? printerGid : QUEUE_GROUP;
    const columnValuesStr = JSON.stringify(JSON.stringify(colVals));

    const mutation = `mutation {
      create_item(
        board_id: ${BOARD_ID},
        group_id: "${targetGroup}",
        item_name: ${JSON.stringify(name)},
        column_values: ${columnValuesStr}
      ) { id name }
    }`;

    const result = await gql(mutation);
    const newId = result?.create_item?.id;
    if (!newId) throw new Error('Item creation failed — no ID returned');

    statEl.className = 'dp-status ok';
    statEl.textContent = `✓ "${name}" created${mode !== 'queue' ? ' and scheduled' : ' in Queue'}`;

    setTimeout(() => { closeAddJob(); autoRefresh(); }, 1500);

  } catch(e) {
    statEl.className = 'dp-status err';
    statEl.textContent = '✗ Error: ' + e.message;
    document.querySelectorAll('#aj-action-btns .dp-btn').forEach(b => b.disabled = false);
  }
}

let openPopupGid = null;

function openStatusPopup(e, gid, currentStatus) {
  e.stopPropagation();
  const popup = document.getElementById('status-popup');

  // Toggle closed if already open for same printer
  if (openPopupGid === gid && popup.classList.contains('open')) {
    closeStatusPopup(); return;
  }

  // Set title and mark current option
  document.getElementById('sp-title').textContent = (PRINTER_GROUPS[gid]||gid).replace('MJF ','');
  document.getElementById('sp-ready').className = `status-opt opt-ready${currentStatus===1?' current':''}`;
  document.getElementById('sp-maint').className = `status-opt opt-maint${currentStatus===2?' current':''}`;
  document.getElementById('sp-down').className  = `status-opt opt-down${currentStatus===3?' current':''}`;

  openPopupGid = gid;

  // Position popup below the clicked badge using fixed screen coordinates
  const rect = e.target.getBoundingClientRect();
  popup.style.top  = `${rect.bottom + 6}px`;
  popup.style.left = `${rect.left}px`;
  popup.classList.add('open');
}

function closeStatusPopup() {
  const popup = document.getElementById('status-popup');
  if (popup) popup.classList.remove('open');
  openPopupGid = null;
}

document.addEventListener('click', (e) => {
  const popup = document.getElementById('status-popup');
  if (popup && !popup.contains(e.target)) closeStatusPopup();
});

async function changeStatus(newStatusId) {
  const gid = openPopupGid;
  closeStatusPopup();
  if (!gid) return;

  const statusEntry = Object.entries(STATUS_ITEMS).find(([,g]) => g === gid);
  if (!statusEntry) { console.error('No status item found for', gid); return; }
  const statusItemId = statusEntry[0];

  // Optimistically update local state so UI responds immediately
  printerStatuses[gid] = newStatusId;

  // If Down for Service — optimistically move all jobs from this
  // printer lane to queue immediately so the display updates instantly
  if (newStatusId === 3) {
    const laneJobs = printerJobs[gid] || [];
    if (laneJobs.length > 0) {
      const clearedJobs = laneJobs.map(j => ({
        ...j, startDt: null, endDt: null,
      }));
      queueJobs = [...queueJobs, ...clearedJobs];
      printerJobs[gid] = [];
    }
  }

  render();

  // Block auto-refresh while the API call and Lambda processing are in flight
  pendingOperation = true;

  try {
    const mutation = `mutation {
      change_column_value(
        board_id: ${MGMT_BOARD_ID},
        item_id: ${statusItemId},
        column_id: "dropdown_mm3z8jja",
        value: ${JSON.stringify(JSON.stringify({ ids: [newStatusId] }))}
      ) { id }
    }`;
    await gql(mutation);
    console.log(`Printer ${gid} status updated to ${newStatusId}`);

    // If Down for Service, Lambda will move jobs to Queue — refresh after delay
    if (newStatusId === 3) {
      setTimeout(() => { pendingOperation = false; autoRefresh(); }, 6000);
    } else {
      pendingOperation = false;
    }

  } catch(e) {
    console.error('Failed to update printer status:', e.message);
    pendingOperation = false;
    autoRefresh();
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(dt){ if(!dt)return'—';const h=dt.getHours(),m=String(dt.getMinutes()).padStart(2,'0');return`${h%12||12}:${m} ${h>=12?'PM':'AM'}`;}
function fmtDateTime(dt){ if(!dt)return'—';const now=new Date();const isT=dt.toDateString()===now.toDateString();const isTmrw=dt.toDateString()===new Date(now.getTime()+86400000).toDateString();const pre=isT?'':isTmrw?'Tmrw ':dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' ';return pre+fmtTime(dt);}
function fmtRemaining(e,now){const ms=e-now;if(ms<=0)return'Complete';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?`${h}h ${m}m`:`${m}m`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showTip(e,name,start,end,dur,mat){
  const t=document.getElementById('tip');
  t.innerHTML=`<div style="font-weight:700;margin-bottom:5px;font-size:.76rem">${name}</div><div class="tr"><span class="tl">Material</span><span class="tv">${mat}</span></div><div class="tr"><span class="tl">Start</span><span class="tv">${start}</span></div><div class="tr"><span class="tl">End</span><span class="tv">${end}</span></div><div class="tr"><span class="tl">Duration</span><span class="tv">${dur}</span></div>`;
  t.style.left=(e.clientX+12)+'px';t.style.top=(e.clientY+12)+'px';t.classList.add('show');
}
function hideTip(){document.getElementById('tip').classList.remove('show');}
function showLoading(){document.getElementById('gantt').innerHTML='<div id="loading"><div class="spinner"></div><div class="load-txt">Loading production schedule...</div></div>';document.getElementById('queue-section').style.display='none';}
function showErr(msg){document.getElementById('gantt').innerHTML=`<div class="err-box">&#9888; ${msg}</div>`;}
</script>
