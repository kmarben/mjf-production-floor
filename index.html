<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJF Production Floor</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0d0f14;
      --surface:    #13151c;
      --surface2:   #1a1d27;
      --surface3:   #20243280;
      --border:     #2a2f42;
      --border2:    #343a52;
      --accent:     #00c8ff;
      --accent2:    #4f6fff;
      --green:      #00e676;
      --yellow:     #ffb300;
      --red:        #ff3d57;
      --blue:       #448aff;
      --text:       #e8edf5;
      --text-dim:   #5a6480;
      --text-mid:   #8892aa;
      --font:       'Manrope', system-ui, sans-serif;
      --mono:       'Share Tech Mono', monospace;
      --row-h:      72px;
      --label-w:    200px;

      /* Material colors */
      --mat-tpu:    #90ee90;   /* light green */
      --mat-pa12:   #ffd700;   /* yellow */
      --mat-other:  #4f6fff;   /* default blue */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; flex-direction: column; overflow: hidden; }

    /* ── Config bar (collapses after load) ── */
    #cfg {
      background: linear-gradient(90deg,rgba(79,111,255,.12),rgba(0,200,255,.12));
      border-bottom: 1px solid var(--accent2);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      overflow: hidden;
      transition: max-height .35s ease, padding .35s ease, opacity .35s ease;
      max-height: 60px;
    }
    #cfg.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      pointer-events: none;
    }
    #cfg label { font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent2); white-space:nowrap; }
    #cfg input { flex:1; background:var(--surface2); border:1px solid var(--border2); border-radius:5px; padding:6px 11px; color:var(--text); font-family:var(--mono); font-size:.8rem; min-width:0; }
    #cfg input:focus { outline:none; border-color:var(--accent); }
    #cfg .cfg-btn { font-family:var(--font); font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:6px 16px; border:none; border-radius:5px; cursor:pointer; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#000; white-space:nowrap; }
    #cfg .cfg-show { font-family:var(--font); font-size:.68rem; font-weight:600; padding:4px 10px; border:1px solid var(--border2); border-radius:4px; cursor:pointer; background:var(--surface2); color:var(--text-dim); white-space:nowrap; }
    #cfg-toggle { font-family:var(--font); font-size:.65rem; font-weight:600; padding:3px 8px; border:1px solid var(--border2); border-radius:3px; cursor:pointer; background:var(--surface2); color:var(--text-dim); white-space:nowrap; flex-shrink:0; transition:all .15s; }
    #cfg-toggle:hover { border-color:var(--accent2); color:var(--accent2); }

    /* ── Header ── */
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:12px; flex-shrink:0; flex-wrap:wrap; }
    .logo { width:26px; height:26px; background:linear-gradient(135deg,var(--accent2),var(--accent)); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); flex-shrink:0; }
    h1 { font-size:1rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    h1 span { color:var(--accent); }
    .hdr-sep { flex:1; }
    .metrics { display:flex; gap:6px; }
    .metric { background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:5px 12px; text-align:center; }
    .metric-val { font-size:1rem; font-weight:800; color:var(--accent); line-height:1; }
    .metric-lbl { font-size:.58rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }

    /* Material legend */
    .legend { display:flex; align-items:center; gap:8px; }
    .leg-item { display:flex; align-items:center; gap:4px; font-size:.65rem; font-weight:600; color:var(--text-mid); }
    .leg-swatch { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

    .view-toggle { display:flex; background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:3px; gap:3px; }
    .vbtn { font-family:var(--font); font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:4px 12px; border:none; border-radius:3px; cursor:pointer; background:transparent; color:var(--text-dim); transition:all .15s; }
    .vbtn.active { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#000; }
    .nav-btns { display:flex; align-items:center; gap:5px; }
    .nbtn { font-family:var(--font); font-size:.68rem; font-weight:600; padding:4px 10px; border:1px solid var(--border2); border-radius:4px; cursor:pointer; background:var(--surface2); color:var(--text-mid); transition:all .15s; }
    .nbtn:hover { border-color:var(--accent); color:var(--accent); }
    .nbtn.today { border-color:var(--accent2); color:var(--accent2); }
    .date-badge { font-family:var(--mono); font-size:.75rem; color:var(--text-mid); background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:4px 10px; white-space:nowrap; }
    .clock { font-family:var(--mono); font-size:.82rem; color:var(--accent); }

    /* Connection status */
    .conn-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .conn-ok   { background:var(--green); box-shadow:0 0 5px var(--green); }
    .conn-err  { background:var(--red);   box-shadow:0 0 5px var(--red); animation:pulse-r 1.2s infinite; }
    .conn-stale{ background:var(--yellow);box-shadow:0 0 5px var(--yellow); }
    @keyframes pulse-r { 0%,100%{opacity:1} 50%{opacity:.4} }
    .upd { font-family:var(--mono); font-size:.62rem; color:var(--text-dim); }

    .refresh { font-family:var(--font); font-size:.68rem; font-weight:600; padding:4px 10px; border:1px solid var(--border); border-radius:4px; cursor:pointer; background:var(--surface2); color:var(--text-dim); transition:all .15s; }
    .refresh:hover { border-color:var(--accent); color:var(--accent); }

    /* Fullscreen button */
    .fs-btn { font-family:var(--font); font-size:.68rem; font-weight:600; padding:4px 10px; border:1px solid var(--border2); border-radius:4px; cursor:pointer; background:var(--surface2); color:var(--text-dim); transition:all .15s; }
    .fs-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Gantt ── */
    /* ── Gantt scroll structure ──
       The gantt uses two scroll containers:
       - #gantt-scroll handles BOTH horizontal and vertical scrolling
       - .pr-label and .tl-label-spacer use position:sticky; left:0
         so labels stay pinned while the timeline scrolls horizontally
       - #gantt has no min-width constraint — the timeline areas handle their own width
    */
    #gantt-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    #gantt-scroll { flex:1; overflow:auto; }
    #gantt { display:flex; flex-direction:column; }

    /* Timeline header */
    .tl-header { display:flex; position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--border2); }
    .tl-label-spacer {
      width:var(--label-w); flex-shrink:0;
      background:var(--surface); border-right:1px solid var(--border2); border-bottom:1px solid var(--border2);
      display:flex; align-items:center; padding:0 14px;
      position:sticky; left:0; z-index:25;
    }
    .tl-label-spacer span { font-size:.62rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); }
    .tl-slots { display:flex; flex:1; min-width:900px; }
    .tl-slot { flex:1; text-align:center; padding:5px 2px; border-right:1px solid var(--border); background:var(--surface); min-width:0; }
    .tl-slot.today-col { background:rgba(79,111,255,.08); }
    .tl-slot.clickable:hover { background:rgba(79,111,255,.18); cursor:pointer; }
    .tl-slot-main { font-size:.68rem; font-weight:700; color:var(--text-mid); line-height:1.2; }
    .tl-slot-sub  { font-size:.58rem; font-weight:600; color:var(--text-dim); letter-spacing:.05em; line-height:1.2; }

    /* Printer row */
    .printer-row { display:flex; border-bottom:1px solid var(--border); }
    .pr-label {
      width:var(--label-w); flex-shrink:0;
      background:var(--surface); border-right:1px solid var(--border2);
      padding:8px 14px; display:flex; flex-direction:column; gap:4px; justify-content:center;
      position:sticky; left:0; z-index:15;
      /* Subtle right shadow to show it's pinned */
      box-shadow:3px 0 8px rgba(0,0,0,.4);
    }
    .pr-name { font-size:.78rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; }
    .pr-sub  { font-size:.58rem; color:var(--text-dim); font-weight:500; }
    .pr-status-badge { font-size:.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:2px 6px; border-radius:3px; display:inline-block; width:fit-content; }
    .pr-builds { font-size:.58rem; color:var(--text-dim); }
    .status-ready { color:var(--green);  background:rgba(0,230,118,.1);  border:1px solid rgba(0,230,118,.25); }
    .status-maint { color:var(--yellow); background:rgba(255,179,0,.1);  border:1px solid rgba(255,179,0,.25); }
    .status-down  { color:var(--red);    background:rgba(255,61,87,.1);  border:1px solid rgba(255,61,87,.25); }
    .status-idle  { color:var(--text-dim); background:rgba(90,100,128,.1); border:1px solid rgba(90,100,128,.25); }

    /* Timeline area — min-width drives horizontal scroll */
    .pr-timeline { flex:1; position:relative; height:var(--row-h); overflow:hidden; background:var(--surface3); min-width:900px; }
    .pr-timeline.down-bg { background:repeating-linear-gradient(45deg,rgba(255,61,87,.04),rgba(255,61,87,.04) 4px,transparent 4px,transparent 14px); }

    /* Idle state */
    .idle-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:.62rem; color:var(--text-dim); letter-spacing:.1em; opacity:.5; pointer-events:none; }

    /* Grid lines */
    .grid-lines { position:absolute; inset:0; display:flex; pointer-events:none; }
    .grid-line { flex:1; border-right:1px solid rgba(42,47,66,.6); }

    /* Now line */
    .now-line { position:absolute; top:0; bottom:0; width:2px; background:var(--blue); z-index:10; pointer-events:none; transform:translateX(-50%); }
    .now-dot  { position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:8px; height:8px; background:var(--blue); border-radius:50%; box-shadow:0 0 8px var(--blue); }

    /* Job block */
    .job-block { position:absolute; top:6px; height:calc(var(--row-h) - 12px); border-radius:4px; overflow:hidden; cursor:pointer; transition:filter .15s, transform .1s; z-index:5; min-width:4px; }
    .job-block:hover { filter:brightness(1.2); transform:scaleY(1.04); z-index:8; }
    .job-block.past { opacity:.4; }
    .job-block.active { box-shadow:0 0 0 2px var(--blue),0 0 12px rgba(68,138,255,.4); }
    .job-block.continues-right::after { content:'▶'; position:absolute; right:3px; top:50%; transform:translateY(-50%); font-size:.55rem; color:rgba(255,255,255,.7); }
    .job-block.continues-left::before { content:'◀'; position:absolute; left:3px; top:50%; transform:translateY(-50%); font-size:.55rem; color:rgba(255,255,255,.7); }
    .job-block.continues-left  { border-top-left-radius:0; border-bottom-left-radius:0; border-left:3px solid rgba(255,255,255,.4); }
    .job-block.continues-right { border-top-right-radius:0; border-bottom-right-radius:0; border-right:3px solid rgba(255,255,255,.4); }
    .job-inner { height:100%; display:flex; flex-direction:column; justify-content:center; padding:0 8px; overflow:hidden; }
    .job-name  { font-size:.7rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#000; text-shadow:0 1px 2px rgba(255,255,255,.2); }
    .job-times { font-size:.58rem; color:rgba(0,0,0,.65); white-space:nowrap; margin-top:1px; font-family:var(--mono); }

    /* Material colors for job blocks */
    .mat-tpu   { background:linear-gradient(135deg,#5cb85c,#90ee90); }
    .mat-pa12  { background:linear-gradient(135deg,#e6b800,#ffd700); }
    .mat-other { background:linear-gradient(135deg,#1a5fd6,#4f6fff); }

    /* ── Queue ── */
    #queue-section { flex-shrink:0; background:var(--surface); border-top:1px solid var(--border2); padding:8px 20px; }
    .queue-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .queue-title  { font-size:.72rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--text-mid); }
    .queue-count  { font-size:.65rem; font-weight:700; background:var(--surface2); border:1px solid var(--border2); border-radius:10px; padding:1px 7px; color:var(--text-dim); }
    .queue-items  { display:flex; flex-wrap:wrap; gap:5px; max-height:52px; overflow-y:auto; }
    .queue-chip   { font-size:.68rem; font-weight:600; padding:3px 9px; border-radius:4px; border:1px solid var(--border2); background:var(--surface2); color:var(--text-mid); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .queue-chip:hover { border-color:var(--accent2); color:var(--accent); }
    .queue-chip.mat-tpu-chip  { border-color:rgba(144,238,144,.4); color:#5cb85c; }
    .queue-chip.mat-pa12-chip { border-color:rgba(255,215,0,.4);   color:#e6b800; }
    .queue-empty  { font-family:var(--mono); font-size:.7rem; color:var(--text-dim); }

    /* ── Detail Panel ── */
    #detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; }
    #detail-panel { position:fixed; right:0; top:0; bottom:0; width:320px; background:var(--surface); border-left:1px solid var(--border2); z-index:101; overflow-y:auto; display:none; flex-direction:column; }
    #detail-panel.open, #detail-overlay.open { display:flex; }
    .dp-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .dp-title  { font-size:.95rem; font-weight:800; line-height:1.3; }
    .dp-mat    { font-size:.65rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:3px; display:inline-block; margin-top:4px; }
    .dp-close  { background:none; border:none; cursor:pointer; color:var(--text-dim); font-size:1.1rem; padding:2px 5px; border-radius:3px; flex-shrink:0; }
    .dp-close:hover { color:var(--text); background:var(--surface2); }
    .dp-body   { padding:14px 18px; flex:1; display:flex; flex-direction:column; gap:12px; }
    .dp-sec    { font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; }
    .dp-row    { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); }
    .dp-row:last-child { border-bottom:none; }
    .dp-lbl    { font-size:.68rem; color:var(--text-dim); }
    .dp-val    { font-size:.74rem; font-weight:600; color:var(--text); font-family:var(--mono); }
    .dp-progress { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:6px; }
    .dp-fill   { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:2px; }

    /* ── Stale data warning ── */
    #stale-bar { display:none; background:rgba(255,179,0,.12); border-bottom:1px solid rgba(255,179,0,.3); padding:5px 20px; font-family:var(--mono); font-size:.68rem; color:var(--yellow); flex-shrink:0; }
    #stale-bar.show { display:block; }

    /* ── Loading / Error ── */
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:12px; }
    .spinner  { width:34px; height:34px; border:3px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .load-txt  { font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
    .err-box   { background:rgba(255,61,87,.08); border:1px solid rgba(255,61,87,.3); border-radius:6px; padding:12px 16px; font-family:var(--mono); font-size:.75rem; color:var(--red); margin:16px; }

    /* ── Tooltip ── */
    #tip { position:fixed; background:var(--surface2); border:1px solid var(--accent2); border-radius:6px; padding:9px 12px; font-family:var(--mono); font-size:.7rem; pointer-events:none; z-index:200; opacity:0; transition:opacity .12s; max-width:210px; }
    #tip.show { opacity:1; }
    .tr { display:flex; justify-content:space-between; gap:12px; margin-bottom:2px; }
    .tl { color:var(--text-dim); }
    .tv { color:var(--accent); }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    /* Fullscreen hides config entirely */
    :fullscreen #cfg, :-webkit-full-screen #cfg { display:none !important; }
  </style>
</head>
<body>

<div id="tip"></div>
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <div>
      <div class="dp-title" id="dp-title">—</div>
      <div class="dp-mat" id="dp-mat"></div>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<!-- Config bar -->
<div id="cfg">
  <label>API Token</label>
  <input type="password" id="tok" placeholder="Paste your Monday.com API token" />
  <button class="cfg-btn" onclick="saveAndLoad()">Save &amp; Load</button>
</div>

<!-- Stale data warning -->
<div id="stale-bar">⚠ Data may be stale — last refresh failed. Retrying...</div>

<!-- Header -->
<header>
  <div class="logo"></div>
  <h1>MJF <span>Production</span> Floor</h1>
  <div class="metrics" id="metrics"></div>
  <div class="legend">
    <div class="leg-item"><div class="leg-swatch" style="background:#90ee90"></div>TPU</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ffd700"></div>PA12</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#4f6fff"></div>Other</div>
  </div>
  <div class="hdr-sep"></div>
  <div class="view-toggle">
    <button class="vbtn active" id="vbtn-day" onclick="setView('day')">Day</button>
    <button class="vbtn" id="vbtn-week" onclick="setView('week')">Week</button>
  </div>
  <div class="nav-btns">
    <button class="nbtn" onclick="navigate(-1)">&#8592; Prev</button>
    <div class="date-badge" id="date-badge">—</div>
    <button class="nbtn" onclick="navigate(1)">Next &#8594;</button>
    <button class="nbtn today" onclick="goToday()">Today</button>
  </div>
  <div class="clock" id="clock">--:-- --</div>
  <div class="conn-dot conn-ok" id="conn-dot" title="Connection status"></div>
  <div class="upd" id="upd">Not loaded</div>
  <button class="refresh" onclick="loadData()">&#8635;</button>
  <button class="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>
  <button id="cfg-toggle" onclick="toggleCfg()">&#9881; Token</button>
</header>

<div id="gantt-wrap">
  <div id="gantt-scroll">
    <div id="gantt">
      <div id="loading"><div class="spinner"></div><div class="load-txt">Enter API token above to load schedule</div></div>
    </div>
  </div>
  <div id="queue-section" style="display:none">
    <div class="queue-header">
      <span class="queue-title">Queue</span>
      <span class="queue-count" id="q-count">0</span>
    </div>
    <div class="queue-items" id="q-items"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BOARD_ID      = '18415279609';
const MGMT_BOARD_ID = '18416066539';
const QUEUE_GROUP   = 'group_mm3sgb77';
const API_URL       = 'https://api.monday.com/v2';

const PRINTER_GROUPS = {
  'group_mm3smkj2': 'MJF Printer #1',
  'group_mm3sehz6': 'MJF Printer #2',
  'group_mm3sdqtr': 'MJF Printer #3',
  'group_mm3scjck': 'MJF Printer #4',
  'group_mm3std0b': 'MJF Printer #5',
};

const STATUS_ITEMS = {
  '12177667108': 'group_mm3smkj2',
  '12177684374': 'group_mm3sehz6',
  '12177684510': 'group_mm3sdqtr',
  '12177667806': 'group_mm3scjck',
  '12177658207': 'group_mm3std0b',
};

const COL = {
  PRINT_DATE:    'date_mm3tthmm',
  START_TIME:    'hour_mm3s33h0',
  DURATION:      'formula_mm3ymd5b',
  END_DATE:      'date_mm3y3yeb',
  END_TIME:      'hour_mm3swp76',
  MATERIAL_TYPE: 'dropdown_mm3snn2g',
};

// Material color mapping
// PA12 = id 1 → yellow, TPU = id 2 → light green
const MAT_CLASS = { 1: 'mat-pa12', 2: 'mat-tpu' };
const MAT_NAME  = { 1: 'PA12', 2: 'TPU' };
const MAT_CHIP  = { 1: 'mat-pa12-chip', 2: 'mat-tpu-chip' };
const MAT_DP_STYLE = {
  1: 'background:rgba(255,215,0,.15);color:#e6b800;border:1px solid rgba(255,215,0,.3)',
  2: 'background:rgba(144,238,144,.15);color:#5cb85c;border:1px solid rgba(144,238,144,.3)',
};

// ── State ─────────────────────────────────────────────────────────────────────
let tok = localStorage.getItem('mjf_tok') || '';
let view = 'day';
let refDate = new Date();
let printerStatuses = {};
let printerJobs = {};
let queueJobs = [];
let nowLineTimer = null;
let lastLoadTime = null;
let cfgVisible = true;
let consecutiveFailures = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  startClock();
  updateDateBadge();
  if (tok) {
    document.getElementById('tok').value = tok;
    loadData();
  }
  setInterval(autoRefresh, 60000);
});

function saveAndLoad() {
  tok = document.getElementById('tok').value.trim();
  localStorage.setItem('mjf_tok', tok);
  loadData();
}

// ── Config bar toggle ─────────────────────────────────────────────────────────
function toggleCfg() {
  cfgVisible = !cfgVisible;
  document.getElementById('cfg').classList.toggle('collapsed', !cfgVisible);
}

function collapseCfg() {
  cfgVisible = false;
  document.getElementById('cfg').classList.add('collapsed');
}

// ── Fullscreen ────────────────────────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function startClock() {
  const tick = () => {
    const n = new Date();
    const h = n.getHours(), m = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
  };
  tick(); setInterval(tick, 1000);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(dir) {
  const d = new Date(refDate);
  view === 'day' ? d.setDate(d.getDate()+dir) : d.setDate(d.getDate()+dir*7);
  refDate = d; updateDateBadge();
  if (Object.keys(printerJobs).length) render();
}

function goToday() { refDate = new Date(); updateDateBadge(); if (Object.keys(printerJobs).length) render(); }

function setView(v) {
  view = v;
  document.getElementById('vbtn-day').classList.toggle('active', v==='day');
  document.getElementById('vbtn-week').classList.toggle('active', v==='week');
  updateDateBadge();
  if (Object.keys(printerJobs).length || queueJobs.length) render();
}

function updateDateBadge() {
  const r = getRange();
  const el = document.getElementById('date-badge');
  if (view === 'day') {
    el.textContent = r.start.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  } else {
    const s = r.start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const e = new Date(r.end.getTime()-1).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    el.textContent = `${s} – ${e}`;
  }
}

function drillDay(ts) { refDate = new Date(ts); setView('day'); }

// ── Date Range ────────────────────────────────────────────────────────────────
function getRange() {
  const s = new Date(refDate); s.setHours(0,0,0,0);
  const e = new Date(s);
  view === 'day' ? e.setDate(e.getDate()+1) : e.setDate(e.getDate()+7);
  return { start: s, end: e };
}

// ── API ───────────────────────────────────────────────────────────────────────
async function gql(query) {
  const r = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':tok,'API-Version':'2024-01'},
    body:JSON.stringify({query}),
  });
  const d = await r.json();
  if (d.errors) throw new Error(d.errors[0].message);
  return d.data;
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadData() {
  if (!tok) return;
  showLoading();
  try {
    const [statuses, jobs] = await Promise.all([fetchStatuses(), fetchJobs()]);
    printerStatuses = statuses;
    printerJobs = {}; queueJobs = [];
    for (const g of jobs) {
      if (g.groupId === QUEUE_GROUP) queueJobs = g.jobs;
      else if (PRINTER_GROUPS[g.groupId]) printerJobs[g.groupId] = g.jobs;
    }
    lastLoadTime = new Date();
    consecutiveFailures = 0;
    setConnStatus('ok');
    document.getElementById('upd').textContent = 'Updated '+lastLoadTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('stale-bar').classList.remove('show');
    collapseCfg(); // Auto-hide token bar after successful load
    render();
  } catch(e) {
    consecutiveFailures++;
    setConnStatus('err');
    if (lastLoadTime) {
      document.getElementById('stale-bar').classList.add('show');
      render(); // Keep showing last good data
    } else {
      showErr(e.message);
    }
  }
}

async function autoRefresh() {
  if (!tok) return;
  try {
    const [statuses, jobs] = await Promise.all([fetchStatuses(), fetchJobs()]);
    printerStatuses = statuses;
    printerJobs = {}; queueJobs = [];
    for (const g of jobs) {
      if (g.groupId === QUEUE_GROUP) queueJobs = g.jobs;
      else if (PRINTER_GROUPS[g.groupId]) printerJobs[g.groupId] = g.jobs;
    }
    lastLoadTime = new Date();
    consecutiveFailures = 0;
    setConnStatus('ok');
    document.getElementById('upd').textContent = 'Updated '+lastLoadTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('stale-bar').classList.remove('show');
    render();
  } catch(e) {
    consecutiveFailures++;
    setConnStatus(consecutiveFailures >= 3 ? 'err' : 'stale');
    document.getElementById('stale-bar').classList.add('show');
  }
}

function setConnStatus(s) {
  const d = document.getElementById('conn-dot');
  d.className = 'conn-dot conn-'+s;
  d.title = s==='ok'?'Connected':s==='stale'?'Stale — retrying':'Connection error';
}

async function fetchStatuses() {
  const d = await gql(`query{boards(ids:[${MGMT_BOARD_ID}]){items_page{items{id column_values(ids:["dropdown_mm3z8jja"]){id value}}}}}`);
  const s = {};
  for (const item of d?.boards?.[0]?.items_page?.items||[]) {
    const gid = STATUS_ITEMS[item.id]; if (!gid) continue;
    try { const v=JSON.parse(item.column_values[0]?.value||'{}'); s[gid]=v?.ids?.[0]??1; } catch { s[gid]=1; }
  }
  return s;
}

async function fetchJobs() {
  const gids = [...Object.keys(PRINTER_GROUPS), QUEUE_GROUP];
  const d = await gql(`query{boards(ids:[${BOARD_ID}]){groups(ids:${JSON.stringify(gids)}){id items_page(limit:100){items{id name column_values(ids:["${COL.PRINT_DATE}","${COL.START_TIME}","${COL.DURATION}","${COL.END_DATE}","${COL.END_TIME}","${COL.MATERIAL_TYPE}"]){id value text}}}}}}`);
  return (d?.boards?.[0]?.groups||[]).map(g=>({
    groupId: g.id,
    jobs: g.items_page.items.map(parseJob),
  }));
}

function parseJob(item) {
  const get = id => item.column_values?.find(c=>c.id===id);
  const pd = get(COL.PRINT_DATE)?.text||null;
  let sh=null,sm=0,eh=null,em=0;
  try{const p=JSON.parse(get(COL.START_TIME)?.value||'null');if(p){sh=p.hour??0;sm=p.minute??0;}}catch{}
  try{const p=JSON.parse(get(COL.END_TIME)?.value||'null');if(p){eh=p.hour??0;em=p.minute??0;}}catch{}
  const ed = get(COL.END_DATE)?.text||null;
  let dur=null; try{const r=get(COL.DURATION)?.text;if(r&&!isNaN(parseFloat(r)))dur=parseFloat(r);}catch{}
  let matId=null; try{const v=JSON.parse(get(COL.MATERIAL_TYPE)?.value||'null');if(v)matId=v?.ids?.[0]??null;}catch{}
  let sdt=null,edt=null;
  if(pd&&sh!==null){const dt=new Date(`${pd}T${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}:00`);if(!isNaN(dt))sdt=dt;}
  if(ed&&eh!==null){const dt=new Date(`${ed}T${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}:00`);if(!isNaN(dt))edt=dt;}
  return {id:item.id,name:item.name,startDt:sdt,endDt:edt,duration:dur,matId};
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const range = getRange();
  const now   = new Date();
  const gantt = document.getElementById('gantt');

  // Metrics
  let active=0, total=0, queue=queueJobs.length;
  for (const gid of Object.keys(PRINTER_GROUPS)) {
    const jobs = printerJobs[gid]||[];
    total += jobs.length;
    if (jobs.some(j=>j.startDt&&j.endDt&&j.startDt<=now&&j.endDt>=now)) active++;
  }
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-val">${active}/${Object.keys(PRINTER_GROUPS).length}</div><div class="metric-lbl">Active</div></div>
    <div class="metric"><div class="metric-val">${total}</div><div class="metric-lbl">Scheduled</div></div>
    <div class="metric"><div class="metric-val" style="color:${queue>10?'var(--red)':queue>5?'var(--yellow)':'var(--accent)'}">${queue}</div><div class="metric-lbl">Queue</div></div>
  `;

  const slots = buildSlots(range);
  const nowPct = calcPct(now, range);

  // Timeline header
  let html = `<div class="tl-header">
    <div class="tl-label-spacer"><span>Printer</span></div>
    <div class="tl-slots">`;
  slots.forEach(s => {
    const isToday = s.date && s.date.toDateString()===now.toDateString();
    html += `<div class="tl-slot ${isToday?'today-col':''} ${view==='week'?'clickable':''}" ${view==='week'&&s.date?`onclick="drillDay(${s.date.getTime()})"`:''}><div class="tl-slot-main">${s.main}</div><div class="tl-slot-sub">${s.sub}</div></div>`;
  });
  html += `</div></div>`;

  // Printer rows
  for (const [gid, name] of Object.entries(PRINTER_GROUPS)) {
    const status = printerStatuses[gid]||1;
    const sc = status===1?'status-ready':status===2?'status-maint':'status-down';
    const st = status===1?'Production Ready':status===2?'Maintenance Required':'Down for Service';
    const jobs = printerJobs[gid]||[];
    const isDown = status===3;

    // Idle = printer is Production Ready but no job currently running
    const hasActive = jobs.some(j=>j.startDt&&j.endDt&&j.startDt<=now&&j.endDt>=now);
    const hasAny = jobs.length > 0;
    const isIdle = !isDown && status===1 && !hasActive;

    // Status badge — show Idle prominently when printer is ready but not running
    const statusBadge = isIdle
      ? `<div class="pr-status-badge status-ready">Production Ready</div>
         <div class="pr-status-badge status-idle" style="margin-top:2px">&#9679; Idle</div>`
      : `<div class="pr-status-badge ${sc}">${st}</div>`;

    html += `<div class="printer-row">
      <div class="pr-label">
        <div class="pr-name">${name.replace('MJF ','')}</div>
        <div class="pr-sub">HP Multi Jet Fusion</div>
        ${statusBadge}
        <div class="pr-builds">${jobs.length} build${jobs.length!==1?'s':''}</div>
      </div>
      <div class="pr-timeline ${isDown?'down-bg':''}" id="tl-${gid}">
        <div class="grid-lines">${slots.map(()=>`<div class="grid-line"></div>`).join('')}</div>`;

    // Now line
    if (nowPct >= 0 && nowPct <= 100) {
      html += `<div class="now-line" id="nl-${gid}" style="left:${nowPct.toFixed(3)}%"><div class="now-dot"></div></div>`;
    }

    // Idle label
    if (isIdle && !isDown) {
      html += `<div class="idle-label">${hasAny ? 'IDLE — next job scheduled' : 'IDLE — no jobs scheduled'}</div>`;
    }

    // Job blocks
    jobs.forEach(job => {
      if (!job.startDt) return;
      const jEnd = job.endDt || new Date(job.startDt.getTime()+(job.duration||12)*3600000);
      if (jEnd < range.start || job.startDt > range.end) return;

      const lPct  = calcPct(job.startDt, range);
      const rPct  = calcPct(jEnd, range);

      // Clamp to view boundaries — jobs can start before or end after the view
      const clampL = Math.max(0, lPct);
      const clampR = Math.min(100, rPct);
      const clampW = Math.max(clampR - clampL, 0.3);

      const isNow      = job.startDt <= now && jEnd >= now;
      const isPast     = jEnd < now;
      const contLeft   = lPct < 0;    // job started before view start
      const contRight  = rPct > 100;  // job ends after view end
      const matCls     = MAT_CLASS[job.matId] || 'mat-other';

      html += `<div class="job-block ${isPast?'past':''} ${isNow?'active':''} ${contRight?'continues-right':''} ${contLeft?'continues-left':''} ${matCls}"
        style="left:${clampL.toFixed(3)}%;width:${clampW.toFixed(3)}%"
        onclick='showDetail(${JSON.stringify({id:job.id,name:job.name,start:job.startDt?.toISOString(),end:jEnd?.toISOString(),duration:job.duration,matId:job.matId,printer:name})})'
        onmouseenter="showTip(event,'${esc(job.name)}','${fmtTime(job.startDt)}','${fmtTime(jEnd)}','${job.duration?job.duration+'h':'—'}','${MAT_NAME[job.matId]||'—'}')"
        onmouseleave="hideTip()">
        <div class="job-inner">
          <div class="job-name">${esc(job.name)}</div>
          <div class="job-times">${fmtTime(job.startDt)}${jEnd?' → '+fmtTime(jEnd):''}</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  gantt.innerHTML = html;
  renderQueue();
  startNowUpdater(range);
}

function buildSlots(range) {
  const slots = [], now = new Date();
  if (view === 'day') {
    for (let h=0;h<24;h++) {
      const per=h<12?'AM':'PM', h12=h===0?12:h>12?h-12:h;
      slots.push({main:`${h12}:00`,sub:per,date:null});
    }
  } else {
    const cur = new Date(range.start);
    while (cur < range.end) {
      slots.push({main:cur.toLocaleDateString('en-US',{weekday:'short'}),sub:cur.toLocaleDateString('en-US',{month:'short',day:'numeric'}),date:new Date(cur)});
      cur.setDate(cur.getDate()+1);
    }
  }
  return slots;
}

function calcPct(dt, range) {
  return ((dt - range.start) / (range.end - range.start)) * 100;
}

function renderQueue() {
  const qs=document.getElementById('queue-section');
  const qi=document.getElementById('q-items');
  const qc=document.getElementById('q-count');
  if (!queueJobs.length) { qs.style.display='none'; return; }
  qs.style.display='block';
  qc.textContent = queueJobs.length;
  qi.innerHTML = queueJobs.map(j=>{
    const chipCls = MAT_CHIP[j.matId]||'';
    return `<div class="queue-chip ${chipCls}" onclick='showDetail(${JSON.stringify({id:j.id,name:j.name,start:null,end:null,duration:j.duration,matId:j.matId,printer:"Queue"})})'>${esc(j.name)}</div>`;
  }).join('');
}

// ── Now line updater ──────────────────────────────────────────────────────────
function startNowUpdater(range) {
  if (nowLineTimer) clearInterval(nowLineTimer);
  nowLineTimer = setInterval(() => {
    const now=new Date(), pct=calcPct(now,range);
    for (const gid of Object.keys(PRINTER_GROUPS)) {
      const el=document.getElementById(`nl-${gid}`);
      if (el) { el.style.left=pct>=0&&pct<=100?`${pct.toFixed(3)}%`:'-999px'; }
    }
  }, 30000);
}

// ── Detail Panel ──────────────────────────────────────────────────────────────
function showDetail(data) {
  if (typeof data === 'string') data = JSON.parse(data);
  const panel=document.getElementById('detail-panel');
  const overlay=document.getElementById('detail-overlay');
  document.getElementById('dp-title').textContent = data.name;

  const matEl = document.getElementById('dp-mat');
  if (data.matId && MAT_NAME[data.matId]) {
    matEl.textContent = MAT_NAME[data.matId];
    matEl.style.cssText = MAT_DP_STYLE[data.matId]||'';
    matEl.style.display='inline-block';
  } else {
    matEl.style.display='none';
  }

  const now=new Date();
  const sdt=data.start?new Date(data.start):null;
  const edt=data.end?new Date(data.end):null;
  let prog=0;
  if(sdt&&edt&&now>=sdt) prog=Math.min(100,((now-sdt)/(edt-sdt))*100);

  document.getElementById('dp-body').innerHTML = `
    <div>
      <div class="dp-sec">Schedule</div>
      <div class="dp-row"><span class="dp-lbl">Printer</span><span class="dp-val">${data.printer||'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Start</span><span class="dp-val">${sdt?fmtDateTime(sdt):'Not scheduled'}</span></div>
      <div class="dp-row"><span class="dp-lbl">End</span><span class="dp-val">${edt?fmtDateTime(edt):'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Duration</span><span class="dp-val">${data.duration?data.duration+'h':'—'}</span></div>
      <div class="dp-row"><span class="dp-lbl">Remaining</span><span class="dp-val">${edt&&now<edt?fmtRemaining(edt,now):edt?'Complete':'—'}</span></div>
    </div>
    ${sdt&&edt?`<div>
      <div class="dp-sec">Progress</div>
      <div style="font-family:var(--mono);font-size:.7rem;color:var(--text-mid);margin-bottom:4px">${prog.toFixed(0)}% complete</div>
      <div class="dp-progress"><div class="dp-fill" style="width:${prog.toFixed(1)}%"></div></div>
    </div>`:''}
  `;

  panel.classList.add('open');
  overlay.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(dt){ if(!dt)return'—';const h=dt.getHours(),m=String(dt.getMinutes()).padStart(2,'0');return`${h%12||12}:${m} ${h>=12?'PM':'AM'}`;}
function fmtDateTime(dt){ if(!dt)return'—';const now=new Date();const isT=dt.toDateString()===now.toDateString();const isTmrw=dt.toDateString()===new Date(now.getTime()+86400000).toDateString();const pre=isT?'':isTmrw?'Tmrw ':dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' ';return pre+fmtTime(dt);}
function fmtRemaining(e,now){const ms=e-now;if(ms<=0)return'Complete';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h>0?`${h}h ${m}m`:`${m}m`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showTip(e,name,start,end,dur,mat){
  const t=document.getElementById('tip');
  t.innerHTML=`<div style="font-weight:700;margin-bottom:5px;font-size:.76rem">${name}</div><div class="tr"><span class="tl">Material</span><span class="tv">${mat}</span></div><div class="tr"><span class="tl">Start</span><span class="tv">${start}</span></div><div class="tr"><span class="tl">End</span><span class="tv">${end}</span></div><div class="tr"><span class="tl">Duration</span><span class="tv">${dur}</span></div>`;
  t.style.left=(e.clientX+12)+'px';t.style.top=(e.clientY+12)+'px';t.classList.add('show');
}
function hideTip(){document.getElementById('tip').classList.remove('show');}
function showLoading(){document.getElementById('gantt').innerHTML='<div id="loading"><div class="spinner"></div><div class="load-txt">Loading production schedule...</div></div>';document.getElementById('queue-section').style.display='none';}
function showErr(msg){document.getElementById('gantt').innerHTML=`<div class="err-box">&#9888; ${msg}</div>`;}
</script>
